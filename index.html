<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet"> <!-- For LCD display -->
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-body">
            <div class="display-container">
                <div class="memory-indicator" id="memory-indicator">MEMORY</div>
                <div class="display-screen" id="display">0</div>
            </div>
            <div class="buttons-grid">
                <!-- Row 1 -->
                <button class="btn btn-mem" data-action="mrc">MRC</button>
                <button class="btn btn-mem" data-action="m-minus">M-</button>
                <button class="btn btn-mem" data-action="m-plus">M+</button>
                <button class="btn btn-op" data-action="sqrt">&radic;</button>
                <button class="btn btn-op" data-action="percent">%</button>

                <!-- Row 2 -->
                <button class="btn btn-op" data-action="backspace">&larr;</button>
                <button class="btn btn-num" data-num="7">7</button>
                <button class="btn btn-num" data-num="8">8</button>
                <button class="btn btn-num" data-num="9">9</button>
                <button class="btn btn-op" data-action="divide">&divide;</button>

                <!-- Row 3 -->
                <button class="btn btn-action-ce" data-action="ce">CE</button>
                <button class="btn btn-num" data-num="4">4</button>
                <button class="btn btn-num" data-num="5">5</button>
                <button class="btn btn-num" data-num="6">6</button>
                <button class="btn btn-op" data-action="multiply">&times;</button>

                <!-- Row 4 -->
                <button class="btn btn-action-ac" data-action="ac">AC</button>
                <button class="btn btn-num" data-num="1">1</button>
                <button class="btn btn-num" data-num="2">2</button>
                <button class="btn btn-num" data-num="3">3</button>
                <button class="btn btn-op" data-action="subtract">&minus;</button>

                <!-- Row 5 -->
                <button class="btn btn-num" data-num="0">0</button>
                <button class="btn btn-num" data-num="00">00</button>
                <button class="btn btn-num" data-action="decimal">.</button>
                <button class="btn btn-op" data-action="equals">=</button>
                <button class="btn btn-op" data-action="add">+</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
