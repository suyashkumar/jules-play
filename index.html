<!DOCTYPE html>
<html>
<head>
    <title>Pink Calculator</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="memory-indicator">MEMORY</div>
            <div class="screen">0</div>
        </div>
        <div class="buttons">
            <button class="btn function mrc">MRC</button>
            <button class="btn function m-minus">M-</button>
            <button class="btn function m-plus">M+</button>
            <button class="btn operator">√</button>
            <button class="btn operator">%</button>

            <button class="btn function backspace">→</button>
            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn operator">÷</button>

            <button class="btn clear">CE</button>
            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn operator">×</button>

            <button class="btn all-clear">AC</button>
            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn operator">-</button>

            <button class="btn number">0</button>
            <button class="btn number">00</button>
            <button class="btn decimal">.</button>
            <button class="btn equal">=</button>
            <button class="btn operator">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
