<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="memory-indicator">MEMORY</div>
            <input type="text" id="result" value="0" disabled>
        </div>
        <div class="buttons">
            <button class="btn memory btn-color-1">MRC</button>
            <button class="btn memory btn-color-1">M-</button>
            <button class="btn memory btn-color-1">M+</button>
            <button class="btn operator btn-color-2">√</button>
            <button class="btn operator btn-color-2">%</button>

            <button class="btn operator btn-color-1">→</button>
            <button class="btn number btn-color-3">7</button>
            <button class="btn number btn-color-3">8</button>
            <button class="btn number btn-color-3">9</button>
            <button class="btn operator btn-color-2">÷</button>

            <button class="btn clear btn-accent">CE</button>
            <button class="btn number btn-color-4">4</button>
            <button class="btn number btn-color-4">5</button>
            <button class="btn number btn-color-4">6</button>
            <button class="btn operator btn-color-2">×</button>

            <button class="btn clear btn-accent">AC</button>
            <button class="btn number btn-color-5">1</button>
            <button class="btn number btn-color-5">2</button>
            <button class="btn number btn-color-5">3</button>
            <button class="btn operator btn-color-2">-</button>

            <button class="btn number btn-color-6">0</button>
            <button class="btn decimal btn-color-6">.</button>
            <button class="btn operator btn-color-1">=</button>
            <button class="btn operator btn-color-1">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
