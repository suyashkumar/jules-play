<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resistor Color Code Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <div class="display-area">
            <span id="resistor-value">5.7 KΩ ±5%</span>
        </div>
        <div class="bands-container">
            <div class="band-picker">
                <div class="picker-wheel" id="band1-wheel">
                    <!-- Color swatches will be populated by JavaScript -->
                </div>
                <div class="picker-highlight"></div>
            </div>
            <div class="band-picker">
                <div class="picker-wheel" id="band2-wheel">
                    <!-- Color swatches will be populated by JavaScript -->
                </div>
                 <div class="picker-highlight"></div>
            </div>
            <div class="band-picker">
                <div class="picker-wheel" id="band3-wheel">
                    <!-- Color swatches will be populated by JavaScript -->
                </div>
                 <div class="picker-highlight"></div>
            </div>
            <div class="band-picker">
                <div class="picker-wheel" id="band4-wheel">
                    <!-- Color swatches will be populated by JavaScript -->
                </div>
                 <div class="picker-highlight"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
