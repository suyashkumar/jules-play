<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-text">173205080756</div>
        </div>
        <div class="buttons">
            <button class="btn-pink-medium">MRC</button>
            <button class="btn-pink-medium">M-</button>
            <button class="btn-pink-medium">M+</button>
            <button class="btn-pink-dark">√</button>
            <button class="btn-pink-dark">%</button>

            <button class="btn-pink-medium">→</button>
            <button class="btn-pink-light">7</button>
            <button class="btn-pink-light">8</button>
            <button class="btn-pink-light">9</button>
            <button class="btn-pink-dark">÷</button>

            <button class="btn-pink-medium">CE</button>
            <button class="btn-pink-light">4</button>
            <button class="btn-pink-light">5</button>
            <button class="btn-pink-light">6</button>
            <button class="btn-pink-dark">×</button>

            <button class="btn-pink-medium">AC</button>
            <button class="btn-pink-light">1</button>
            <button class="btn-pink-light">2</button>
            <button class="btn-pink-light">3</button>
            <button class="btn-pink-dark">-</button>

            <button class="btn-pink-dark">0</button>
            <button class="btn-pink-light">00</button>
            <button class="btn-pink-light">.</button>
            <button class="btn-pink-dark">=</button>
            <button class="btn-pink-medium">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
