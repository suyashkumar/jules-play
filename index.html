<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="screen">
            <div class="memory-text">MEMORY</div>
            <div class="display">
                <div class="display-text">0</div>
            </div>
        </div>
        <div class="buttons">
            <button class="btn pink-medium">MRC</button>
            <button class="btn pink-medium">M-</button>
            <button class="btn pink-medium">M+</button>
            <button class="btn pink-dark operator">√</button>
            <button class="btn pink-dark operator">%</button>

            <button class="btn pink-light arrow">→</button>
            <button class="btn pink-light number">7</button>
            <button class="btn pink-light number">8</button>
            <button class="btn pink-light number">9</button>
            <button class="btn pink-medium operator">÷</button>

            <button class="btn pink-dark clear">CE</button>
            <button class="btn pink-light number">4</button>
            <button class="btn pink-light number">5</button>
            <button class="btn pink-light number">6</button>
            <button class="btn pink-medium operator">×</button>

            <button class="btn pink-dark all-clear">AC</button>
            <button class="btn pink-light number">1</button>
            <button class="btn pink-light number">2</button>
            <button class="btn pink-light number">3</button>
            <button class="btn pink-medium operator">-</button>

            <button class="btn pink-light number">0</button>
            <button class="btn pink-light number">00</button>
            <button class="btn pink-medium operator">.</button>
            <button class="btn pink-dark equals">=</button>
            <button class="btn pink-medium operator">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
