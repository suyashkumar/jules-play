<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display-container">
            <div class="display-label">MEMORY</div>
            <div class="display-screen" id="display">0</div>
        </div>
        <div class="buttons-grid">
            <!-- Row 1 -->
            <button class="btn function" data-action="mrc">MRC</button>
            <button class="btn function" data-action="m-minus">M-</button>
            <button class="btn function" data-action="m-plus">M+</button>
            <button class="btn function" data-action="sqrt">√</button>
            <button class="btn function" data-action="percent">%</button>

            <!-- Row 2 -->
            <button class="btn function" data-action="backspace">→</button>
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="/">÷</button>

            <!-- Row 3 -->
            <button class="btn action" data-action="ce">CE</button>
            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="*">×</button>

            <!-- Row 4 -->
            <button class="btn action" data-action="ac">AC</button>
            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="-">-</button>

            <!-- Row 5 -->
            <button class="btn number" data-value="0">0</button>
            <button class="btn number" data-value="00">00</button>
            <button class="btn decimal" data-value=".">.</button>
            <button class="btn equal" data-action="calculate">=</button>
            <button class="btn operator" data-value="+">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
