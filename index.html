<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resistor Color Code Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Resistor Color Code Calculator</h1>
        <div class="resistor">
            <svg viewBox="0 0 500 100">
                <rect x="50" y="30" width="400" height="40" fill="#d2b48c" />
                <rect x="150" y="20" width="20" height="60" fill="#8b4513" class="band" id="band1" />
                <rect x="200" y="20" width="20" height="60" fill="#8b4513" class="band" id="band2" />
                <rect x="250" y="20" width="20" height="60" fill="#8b4513" class="band" id="band3" />
                <rect x="350" y="20" width="20" height="60" fill="#8b4513" class="band" id="band4" />
            </svg>
        </div>
        <div class="controls">
            <div class="band-selectors">
                <div class="selector">
                    <label for="selector1">1st Band</label>
                    <select id="selector1"></select>
                </div>
                <div class="selector">
                    <label for="selector2">2nd Band</label>
                    <select id="selector2"></select>
                </div>
                <div class="selector">
                    <label for="selector3">Multiplier</label>
                    <select id="selector3"></select>
                </div>
                <div class="selector">
                    <label for="selector4">Tolerance</label>
                    <select id="selector4"></select>
                </div>
            </div>
        </div>
        <div class="result">
            <h2>Resistance: <span id="resistance"></span></h2>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
