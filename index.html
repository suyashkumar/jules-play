<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="calculator-screen">
            <div class="memory-indicator">MEMORY</div>
            <div class="display">0</div>
        </div>
        <div class="calculator-buttons">
            <button class="button function mrc">MRC</button>
            <button class="button function m-minus">M-</button>
            <button class="button function m-plus">M+</button>
            <button class="button operator sqrt">√</button>
            <button class="button operator percent">%</button>

            <button class="button function arrow">→</button>
            <button class="button number">7</button>
            <button class="button number">8</button>
            <button class="button number">9</button>
            <button class="button operator divide">÷</button>

            <button class="button function ce">CE</button>
            <button class="button number">4</button>
            <button class="button number">5</button>
            <button class="button number">6</button>
            <button class="button operator multiply">×</button>

            <button class="button function ac">AC</button>
            <button class="button number">1</button>
            <button class="button number">2</button>
            <button class="button number">3</button>
            <button class="button operator subtract">−</button>

            <button class="button number zero">0</button>
            <button class="button number double-zero">00</button>
            <button class="button number dot">.</button>
            <button class="button operator equals">=</button>
            <button class="button operator add">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
